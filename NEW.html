<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>User Profile</h1>
    <p id="name">Name: John Doe</p>
    <p id="age">Age: 30</p>
<button onclick="updateProfile()">Update Profile</button>
<script>
    function updateProfile() {
        document.getElementById("name").textContent = "Name: Jane Smith";
        document.getElementById("age").textContent = "Age: 25";
    }
</script>
</body>
</html>
